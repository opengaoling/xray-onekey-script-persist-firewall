name: Sync Xray Kernel to Releases

on:
  # schedule:
  #  - cron: '0 0 * * *'  # 每天 00:00 UTC 运行
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Get latest Xray-core release
        id: get_latest_release
        run: |
          LATEST_TAG=$(curl -sL "https://api.github.com/repos/XTLS/Xray-core/releases/latest" | jq -r '.tag_name // empty')
          if [ -z "$LATEST_TAG" ]; then
            echo "Failed to get latest tag from XTLS/Xray-core"
            exit 1
          fi
          echo "latest_tag=${LATEST_TAG}" >> $GITHUB_OUTPUT

      - name: Download Xray-core
        id: download
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=${{ steps.get_latest_release.outputs.latest_tag }}
          mkdir -p downloads
          echo "Downloading all assets for tag ${LATEST_TAG}..."
          gh release download "$LATEST_TAG" -R XTLS/Xray-core --dir downloads

      - name: Upload to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: downloads/*
          tag: ${{ steps.get_latest_release.outputs.latest_tag }}
          overwrite: true
          file_glob: true
